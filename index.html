<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swing Sync</title>
    <style>
      :root {
        color: #17211b;
        background: #f7f5ef;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        box-sizing: border-box;
        min-height: 100vh;
        padding: 48px 24px;
        display: grid;
        gap: 28px;
        align-content: start;
        max-width: 880px;
        margin: 0 auto;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #526356;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 12px;
        font-size: clamp(2.25rem, 6vw, 4rem);
        line-height: 1;
      }

      h2 {
        font-size: 1.35rem;
      }

      header p,
      .consent-panel p,
      .consent-panel li {
        color: #38483e;
        line-height: 1.6;
      }

      .consent-panel {
        border: 1px solid #d8ddd2;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 18px 45px rgb(23 33 27 / 8%);
      }

      .consent-check {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        margin: 20px 0;
        font-weight: 700;
      }

      .consent-check input {
        width: 20px;
        height: 20px;
        margin-top: 2px;
        accent-color: #245b3b;
        flex: 0 0 auto;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        color: #ffffff;
        background: #245b3b;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        color: #778179;
        background: #e3e7dd;
        cursor: not-allowed;
      }

      .status {
        margin: 16px 0 0;
        font-size: 0.95rem;
      }

      @media (max-width: 560px) {
        .app-shell {
          padding: 32px 16px;
        }

        .consent-panel {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
